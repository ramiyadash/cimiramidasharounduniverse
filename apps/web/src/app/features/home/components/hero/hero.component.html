<section
  class="hero"
  [style.--hero-accent]="journey.accentColor"
  [attr.data-journey]="journey.type"
>
  <div
    class="hero-backgrounds"
    aria-hidden="true"
  >
    @if (previousJourney) {
      <img
        class="hero-background hero-background-previous"
        [class.is-leaving]="isTransitioning"
        [src]="previousJourney.heroImage"
        alt=""
        decoding="async"
      />
    }

    <img
      class="hero-background hero-background-current"
      [class.is-entering]="isTransitioning"
      [src]="journey.heroImage"
      alt=""
      decoding="async"
    />
  </div>

  <div
    class="hero-overlay"
    aria-hidden="true"
  ></div>

  <div
  class="hero-panel"
  [class.is-transitioning]="isTransitioning"
>
  <div class="hero-glass">
    <div class="hero-eyebrow">
      <span class="hero-icon">
        {{ journey.icon }}
      </span>

      <span>Your next journey</span>
    </div>

    <h1>
      {{ journey.heroTitle }}

      <span>
        {{ journey.heroHighlight }}
      </span>
    </h1>

    <p class="hero-subtitle">
      {{ journey.heroSubtitle }}
    </p>

    <div
      class="hero-prompts"
      aria-label="Journey ideas"
    >
      @for (
        prompt of journey.heroPrompts;
        track prompt
      ) {
        <a
          class="hero-prompt"
          href="#planning-session"
        >
          {{ prompt }}
        </a>
      }
    </div>

    <a
      class="hero-action"
      href="#planning-session"
    >
      <span>Start planning</span>

      <span aria-hidden="true">
        →
      </span>
    </a>
  </div>
</div>

  <div
    class="journey-badge"
    [class.is-transitioning]="isTransitioning"
  >
    <span class="journey-badge-icon">
      {{ journey.icon }}
    </span>

    <div>
      <small>Selected journey</small>

      <strong>
        {{ journey.title }}
      </strong>
    </div>
  </div>
</section>
