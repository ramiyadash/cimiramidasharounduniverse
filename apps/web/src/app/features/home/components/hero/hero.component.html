<section
  class="hero"
  [style.--hero-accent]="journey.accentColor"
  [style.--hero-background]="journey.softBackground"
>

  <div class="hero-content">
    <div class="hero-icon">
      {{ journey.icon }}
    </div>

    <h1>
      {{ journey.heroTitle }}
      <span>{{ journey.heroHighlight }}</span>
    </h1>

    <p class="subtitle">
      {{ journey.heroSubtitle }}
    </p>
  </div>
</section>
