<div class="journey-grid">
  @for (journey of journeys; track journey.type) {
      <button
          type="button"
          class="journey-card"
          [class.journey-card--selected]="
              selectedJourney?.type === journey.type
          "
          [style.--journey-accent]="journey.accentColor"
          [style.--journey-background]="journey.selectedBackground"
          (click)="selectJourney(journey)"
      >
          <span
              class="journey-card__check"
              aria-hidden="true"
          >
              ✓
          </span>

          <span class="journey-card__icon">
              {{ journey.icon }}
          </span>

          <span class="journey-card__title">
              {{ journey.title }}
          </span>

          <span class="journey-card__description">
              {{ journey.description }}
          </span>
      </button>
  }
</div>
