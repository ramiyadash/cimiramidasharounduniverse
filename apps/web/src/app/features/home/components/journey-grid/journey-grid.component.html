<section class="journey-grid">
    @for (journey of journeys; track journey.type) {
        <button
        class="journey-card"
        [class.weekend]="journey.type === 'weekend'"
        [class.family]="journey.type === 'family'"
        [class.adventure]="journey.type === 'adventure'"
        [class.food]="journey.type === 'food'"
        [class.selected]="selectedType === journey.type"
        type="button"
        (click)="selectJourney(journey)"
      >
        <span class="icon">{{ journey.icon }}</span>
        <strong>{{ journey.title }}</strong>
        <small>{{ journey.description }}</small>
      </button>
    }
  </section>
