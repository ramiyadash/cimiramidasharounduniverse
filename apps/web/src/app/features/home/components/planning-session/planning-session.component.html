<section
  class="planning-card"
  [style.--journey-accent]="journey.accentColor"
  [style.--journey-bg]="journey.selectedBackground">
    <div class="welcome">
      <div class="avatar">{{ journey.icon }}</div>
  
      <div>
        <p class="section-label">Planning Session</p>
        <h2>{{ journey.planningTitle }}</h2>
        <p>{{ journey.planningMessage }}</p>
      </div>
    </div>
  
    <div class="composer">
      <input [placeholder]="journey.inputPlaceholder" />
      <button>➤</button>
    </div>
  </section>
